services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: SkyPredict India
      DEBUG: "True"
      REDIS_URL: redis://redis:6379
      MODEL_PATH: models/lgbm_model.pkl
      PRICE_STORE_TTL_DAYS: "90"
      CACHE_TTL_SECONDS: "21600"
      DAILY_FETCH_CRON: "30 19 * * *"
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  redis_data:
